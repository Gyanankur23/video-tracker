<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Object Tracking - Client Side</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #2d2d2d;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        header {
            background: #1e1e1e;
            color: #ffffff;
            padding: 24px 32px;
            border-bottom: 1px solid #3d3d3d;
        }

        header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        header p {
            color: #888;
            margin-top: 8px;
            font-size: 14px;
        }

        .content {
            padding: 32px;
        }

        .video-container {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 24px;
            aspect-ratio: 16/9;
            border: 1px solid #3d3d3d;
        }

        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .controls {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 14px 32px;
            font-size: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: #007acc;
            color: white;
        }

        .btn-primary:hover {
            background: #005a9e;
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        .btn-primary:disabled {
            background: #3d3d3d;
            color: #888;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #3d3d3d;
            color: #ffffff;
        }

        .btn-secondary:hover {
            background: #4d4d4d;
        }

        .btn-secondary:active {
            transform: translateY(1px);
        }

        .status {
            text-align: center;
            padding: 16px;
            background: #2d2d2d;
            border-radius: 6px;
            margin-bottom: 24px;
            border: 1px solid #3d3d3d;
            font-size: 14px;
            color: #888;
        }

        .status.active {
            background: #1e3a1e;
            color: #4caf50;
            border-color: #2e4a2e;
        }

        .status.loading {
            background: #3a2e1e;
            color: #ff9800;
            border-color: #4a3e2e;
        }

        .status.inactive {
            background: #2d2d2d;
            color: #888;
            border-color: #3d3d3d;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }

        .stat-card {
            background: #1e1e1e;
            padding: 16px;
            border-radius: 6px;
            border: 1px solid #3d3d3d;
        }

        .stat-card h3 {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card p {
            color: #ffffff;
            font-size: 24px;
            font-weight: 600;
        }

        .detection-list {
            background: #1e1e1e;
            padding: 16px;
            border-radius: 6px;
            border: 1px solid #3d3d3d;
            margin-top: 24px;
            max-height: 200px;
            overflow-y: auto;
        }

        .detection-list h3 {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .detection-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #3d3d3d;
            color: #ffffff;
            font-size: 14px;
        }

        .detection-item:last-child {
            border-bottom: none;
        }

        .detection-item .confidence {
            color: #4caf50;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Real-Time Object Detection</h1>
            <p>Custom YOLO Model - Backpack, Pen, Person, Mobile Phone, Notebook</p>
        </header>

        <div class="content">
            <div class="status inactive" id="status">
                Model loading...
            </div>

            <div class="video-container">
                <video id="videoElement" autoplay playsinline muted style="display:none;"></video>
                <img id="videoFeed" src="" alt="Video feed">
            </div>

            <div class="controls">
                <button class="btn-primary" id="startBtn" onclick="startCamera()" disabled>
                    Start Camera
                </button>
                <button class="btn-secondary" id="stopBtn" onclick="stopCamera()" disabled>
                    Stop Camera
                </button>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <h3>FPS</h3>
                    <p id="fps">0</p>
                </div>
                <div class="stat-card">
                    <h3>Detections</h3>
                    <p id="detectionCount">0</p>
                </div>
                <div class="stat-card">
                    <h3>Inference Time</h3>
                    <p id="inferenceTime">0ms</p>
                </div>
            </div>

            <div class="detection-list">
                <h3>Detected Objects</h3>
                <div id="detectionList"></div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let isStreaming = false;
        let videoElement = null;
        let canvas = null;
        let ctx = null;
        let animationFrameId = null;
        let lastFrameTime = 0;
        let frameCount = 0;
        let fps = 0;
        
        // Server URL
        const BASE_URL = window.location.origin;

        // Initialize
        async function initModel() {
            const status = document.getElementById('status');
            const startBtn = document.getElementById('startBtn');
            
            try {
                status.className = 'status loading';
                status.textContent = 'Connecting to Roboflow API...';
                
                // Check server health
                const response = await fetch(`${BASE_URL}/health`);
                if (response.ok) {
                    status.className = 'status inactive';
                    status.textContent = 'Connected to Roboflow API - Ready to start camera';
                    startBtn.disabled = false;
                } else {
                    throw new Error('Server not responding');
                }
            } catch (error) {
                console.error('Error connecting to server:', error);
                status.className = 'status inactive';
                status.textContent = 'Error connecting to server: ' + error.message;
            }
        }

        // Process frame with server-side detection
        async function processFrame() {
            if (!isStreaming) return;
            
            const videoElement = document.getElementById('videoElement');
            const videoFeed = document.getElementById('videoFeed');
            
            if (videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
                const startTime = performance.now();
                
                // Draw current frame to canvas
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = videoElement.videoWidth;
                tempCanvas.height = videoElement.videoHeight;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(videoElement, 0, 0, tempCanvas.width, tempCanvas.height);
                
                // Convert to blob
                tempCanvas.toBlob(async (blob) => {
                    if (!blob || !isStreaming) return;
                    
                    const formData = new FormData();
                    formData.append('file', blob, 'frame.jpg');
                    
                    try {
                        const response = await fetch(`${BASE_URL}/detect`, {
                            method: 'POST',
                            body: formData
                        });
                        
                        if (response.ok) {
                            const imageBlob = await response.blob();
                            
                            // Display annotated frame
                            if (videoFeed.src.startsWith('blob:')) {
                                URL.revokeObjectURL(videoFeed.src);
                            }
                            videoFeed.src = URL.createObjectURL(imageBlob);
                            
                            // Update stats
                            const endTime = performance.now();
                            const inferenceTime = endTime - startTime;
                            
                            document.getElementById('inferenceTime').textContent = `${inferenceTime.toFixed(1)}ms`;
                            
                            // Calculate FPS
                            frameCount++;
                            const now = performance.now();
                            if (now - lastFrameTime >= 1000) {
                                fps = frameCount;
                                frameCount = 0;
                                lastFrameTime = now;
                                document.getElementById('fps').textContent = fps;
                            }
                        }
                    } catch (error) {
                        console.error("Frame upload error:", error);
                    }
                    
                    if (isStreaming) {
                        animationFrameId = requestAnimationFrame(processFrame);
                    }
                }, 'image/jpeg', 0.7);
            } else {
                setTimeout(processFrame, 100);
            }
        }

        // Start camera
        async function startCamera() {
            if (isStreaming) return;
            
            videoElement = document.getElementById('videoElement');
            const status = document.getElementById('status');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        frameRate: { ideal: 15 }
                    }
                });
                
                videoElement.srcObject = stream;
                await videoElement.play();
                
                isStreaming = true;
                status.className = 'status active';
                status.textContent = 'Camera active - Detecting people via Roboflow API...';
                startBtn.disabled = true;
                stopBtn.disabled = false;
                
                // Start processing
                lastFrameTime = performance.now();
                frameCount = 0;
                processFrame();
                
            } catch (error) {
                console.error('Error accessing camera:', error);
                status.className = 'status inactive';
                status.textContent = 'Error accessing camera: ' + error.message;
                alert('Could not access webcam. Please ensure you have granted camera permissions.');
            }
        }

        // Stop camera
        function stopCamera() {
            if (!isStreaming) return;
            
            isStreaming = false;
            
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            
            if (videoElement && videoElement.srcObject) {
                const tracks = videoElement.srcObject.getTracks();
                tracks.forEach(track => track.stop());
                videoElement.srcObject = null;
            }
            
            const status = document.getElementById('status');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const videoFeed = document.getElementById('videoFeed');
            
            status.className = 'status inactive';
            status.textContent = 'Camera inactive';
            startBtn.disabled = false;
            stopBtn.disabled = true;
            
            if (videoFeed.src.startsWith('blob:')) {
                URL.revokeObjectURL(videoFeed.src);
            }
            videoFeed.src = '';
            
            // Reset stats
            document.getElementById('fps').textContent = '0';
            document.getElementById('detectionCount').textContent = '0';
            document.getElementById('inferenceTime').textContent = '0ms';
            document.getElementById('detectionList').innerHTML = '';
        }

        // Initialize on load
        window.addEventListener('load', initModel);
    </script>
</body>
</html>
