<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Object Tracking in Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #2d2d2d;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        header {
            background: #1e1e1e;
            color: #ffffff;
            padding: 24px 32px;
            border-bottom: 1px solid #3d3d3d;
        }

        header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .content {
            padding: 32px;
        }

        .video-container {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 24px;
            aspect-ratio: 16/9;
            border: 1px solid #3d3d3d;
        }

        #videoFeed {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .controls {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        button {
            padding: 14px 32px;
            font-size: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: #007acc;
            color: white;
        }

        .btn-primary:hover {
            background: #005a9e;
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background: #3d3d3d;
            color: #ffffff;
        }

        .btn-secondary:hover {
            background: #4d4d4d;
        }

        .btn-secondary:active {
            transform: translateY(1px);
        }

        .status {
            text-align: center;
            padding: 16px;
            background: #2d2d2d;
            border-radius: 6px;
            margin-bottom: 24px;
            border: 1px solid #3d3d3d;
            font-size: 14px;
            color: #888;
        }

        .status.active {
            background: #1e3a1e;
            color: #4caf50;
            border-color: #2e4a2e;
        }

        .status.inactive {
            background: #2d2d2d;
            color: #888;
            border-color: #3d3d3d;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Multi Object Tracking in Video</h1>
        </header>

        <div class="content">
            <div class="status inactive" id="status">
                Camera inactive
            </div>

            <div class="video-container">
                <!-- Keep the image feed to display annotated results -->
                <img id="videoFeed" src="" alt="Video feed">
                
                <!-- Added a hidden video element to process camera data locally -->
                <video id="hiddenVideo" autoplay playsinline style="display:none;"></video>
            </div>

            <div class="controls">
                <button class="btn-primary" onclick="startCamera()">Start Camera</button>
                <button class="btn-secondary" onclick="stopCamera()">Stop Camera</button>
            </div>
        </div>
    </div>

    <script>
        let isStreaming = false;
        let localStream = null;
        let animationFrameId = null;
        
        // Dynamic base URL targeting your deployed domain automatically
        const BASE_URL = window.location.origin;

        async function startCamera() {
            if (isStreaming) return;
            
            const videoElement = document.getElementById('hiddenVideo');
            const status = document.getElementById('status');
            
            try {
                // Request webcam stream natively in the user's browser
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480, frameRate: { max: 15 } } 
                });
                
                videoElement.srcObject = localStream;
                isStreaming = true;
                status.className = 'status active';
                status.textContent = 'Camera active - Tracking objects...';
                
                // Start sending frames to Render
                sendFramesLoop();
                
            } catch (err) {
                console.error("Webcam Error:", err);
                status.className = 'status inactive';
                status.textContent = 'Failed to access camera. Make sure you use HTTPS!';
                alert("Could not access webcam. Ensure permission is granted and you are using HTTPS.");
            }
        }

        function stopCamera() {
            if (!isStreaming) return;
            
            isStreaming = false;
            
            // Stop processing loops
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            
            // Turn off webcam hardware light
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            
            const videoFeed = document.getElementById('videoFeed');
            const status = document.getElementById('status');
            
            videoFeed.src = '';
            status.className = 'status inactive';
            status.textContent = 'Camera inactive';
        }

        async function sendFramesLoop() {
            if (!isStreaming) return;

            const videoElement = document.getElementById('hiddenVideo');
            const videoFeed = document.getElementById('videoFeed');

            // Wait for video metadata to populate frame sizes
            if (videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
                
                // Draw current frame to an invisible in-memory canvas
                const canvas = document.createElement('canvas');
                canvas.width = videoElement.videoWidth;
                canvas.height = videoElement.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                
                // Convert frame canvas to JPEG blob
                canvas.toBlob(async (blob) => {
                    if (!blob || !isStreaming) return;
                    
                    const formData = new FormData();
                    formData.append('file', blob, 'frame.jpg');
                    
                    try {
                        // Send the frame image file directly to the /detect API
                        const response = await fetch(`${BASE_URL}/detect`, {
                            method: 'POST',
                            body: formData
                        });
                        
                        if (response.ok) {
                            // Extract raw image response bytes
                            const imageBlob = await response.blob();
                            
                            // Revoke old URL to manage browser memory safely
                            if (videoFeed.src.startsWith('blob:')) {
                                URL.revokeObjectURL(videoFeed.src);
                            }
                            
                            // Display the YOLO-annotated frame back to the screen
                            videoFeed.src = URL.createObjectURL(imageBlob);
                        }
                    } catch (error) {
                        console.error("Frame upload network failure:", error);
                    }
                    
                    // Loop again on the next available browser animation frame tick
                    if (isStreaming) {
                        animationFrameId = requestAnimationFrame(sendFramesLoop);
                    }
                }, 'image/jpeg', 0.7); // 0.7 compression balances speed over quality for networking
                
            } else {
                // Retry shortly if video element isn't fully ready yet
                setTimeout(sendFramesLoop, 100);
            }
        }
    </script>
</body>
</html>
